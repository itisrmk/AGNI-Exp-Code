# AGNI Default Configuration
seed: 42
device: "mps"  # Use Apple Silicon GPU, fallback to "cpu"

data:
  dataset: "ohio"
  data_dir: "../OhioT1DM/archive"
  window_size: 24  # 120 minutes at 5-min intervals
  prediction_horizons: [3, 6, 12]  # 15, 30, 60 minutes
  train_split: 0.5  # First 50% for training
  val_split: 0.2    # 20% of training for validation

preprocessing:
  min_glucose: 20
  max_glucose: 600
  max_gap_minutes: 30
  normalize: true

models:
  lstm:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
  tcn:
    num_channels: [32, 32, 32, 32]
    kernel_size: 3
    dropout: 0.2
  transformer:
    d_model: 64
    nhead: 4
    num_layers: 1
    dim_feedforward: 128
    dropout: 0.1

training:
  batch_size: 32
  learning_rate: 0.001
  max_epochs: 100
  early_stopping_patience: 10
  optimizer: "adam"
  loss: "mse"

adaptation:
  static:
    enabled: true
  periodic:
    enabled: true
    interval_days: 7
    retrain_window_days: 7
  continual:
    enabled: true
    update_interval_days: 1
    update_steps: 50
    ewc_lambda: 1000
    ewc_gamma: 0.9  # Online EWC decay
    replay_buffer_size: 200
    replay_ratio: 0.5
    hypo_buffer_fraction: 0.2
    hyper_buffer_fraction: 0.2

evaluation:
  metrics: ["mae", "rmse", "correlation"]
  clinical_metrics: ["clarke_grid", "hypo_sensitivity", "hypo_specificity"]

visualization:
  style: "seaborn-v0_8-whitegrid"
  figure_dpi: 300
  figure_format: "pdf"
  color_palette: ["#2ecc71", "#3498db", "#e74c3c"]  # Static, Periodic, Continual
